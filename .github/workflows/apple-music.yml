name: Update Apple Music Counter

on:
  workflow_dispatch:

jobs:
  update-apple-music:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/wonytest0-dev/apple-music-private.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apple-music-private
        run: npm install

      - name: Install Playwright
        working-directory: apple-music-private
        run: npx playwright install chromium --with-deps

      - name: Restore config (if needed)
        run: |
          cat << 'EOF' > apple-music-private/config.json
          ${{ secrets.APPLE_CONFIG_JSON }}
          EOF

      - name: Copy history files to private repo
        run: |
          cp apple-music-history.json apple-music-private/ || true
          cp apple-music-all-history.json apple-music-private/ || true
          cp global-history.json apple-music-private/ || true

      - name: Run Apple Music scraper
        working-directory: apple-music-private
        run: node generate-apple-music.js

      - name: Copy generated files
        run: |
          cp -f apple-music-private/*.json . 2>/dev/null || true

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apple-music.json
          git add apple-music-history.json
          git add apple-music-all-history.json
          git add global-history.json

          git diff --staged --quiet || git commit -m "update apple music counter"

          git push
