name: Apple Music Top 100

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/wonytest0-dev/apple-music-private.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apple-music-private
        run: npm install

      - name: Install Playwright
        working-directory: apple-music-private
        run: npx playwright install chromium --with-deps

      - name: Restore secrets/config (if needed)
        run: |
          echo '${{ secrets.APPLE_CONFIG_JSON }}' > apple-music-private/config.json

      - name: Copy history into private repo
        run: |
          cp apple-music-history.json apple-music-private/ || true
          cp apple-music-all-history.json apple-music-private/ || true
          cp global-history.json apple-music-private/ || true

      - name: Run scraper
        working-directory: apple-music-private
        run: node generate-apple-music.js

      - name: Copy output back to public repo
        run: |
          cp -f apple-music-private/apple-music.json . 2>/dev/null || true
          cp -f apple-music-private/apple-music-history.json . 2>/dev/null || true
          cp -f apple-music-private/apple-music-all-history.json . 2>/dev/null || true
          cp -f apple-music-private/global-history.json . 2>/dev/null || true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apple-music.json apple-music-history.json apple-music-all-history.json global-history.json

          git diff --staged --quiet && echo "🟰 No changes" && exit 0

          git commit -m "Auto update Apple Music chart"
          git push
