name: Apple Music Top 100

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apple-music-private
        run: npm install

      - name: Install Playwright
        working-directory: apple-music-private
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: apple-music-private
        run: node generate-apple-music.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apple-music.json apple-music-history.json apple-music-all-history.json global-history.json

          git diff --staged --quiet && exit 0

          git commit -m "Auto update Apple Music chart"
          git push
